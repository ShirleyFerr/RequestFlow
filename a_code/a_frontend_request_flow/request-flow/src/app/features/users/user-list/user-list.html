<section class="users">
  <app-page-header title="Usuários" subtitle="Gestão de acessos ao RequestFlow">
    <button matButton="filled" type="button" (click)="openCreateDialog()">
      <mat-icon aria-hidden="true">person_add</mat-icon>
      Novo usuário
    </button>
  </app-page-header>

  <mat-card class="users-card">
    <mat-card-content>
      <div class="table-wrap">
        <table mat-table [dataSource]="users">
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let user">{{ user.id }}</td>
          </ng-container>

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let user">{{ user.name }}</td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>E-mail</th>
            <td mat-cell *matCellDef="let user">{{ user.email }}</td>
          </ng-container>

          <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef>Perfil</th>
            <td mat-cell *matCellDef="let user">{{ roleLabel(user.role) }}</td>
          </ng-container>

          <ng-container matColumnDef="active">
            <th mat-header-cell *matHeaderCellDef>Ativo</th>
            <td mat-cell *matCellDef="let user">
              <mat-checkbox [checked]="user.active" disabled [aria-label]="user.active ? 'Usuário ativo' : 'Usuário inativo'" />
            </td>
          </ng-container>

          <ng-container matColumnDef="createdAt">
            <th mat-header-cell *matHeaderCellDef>Criado em</th>
            <td mat-cell *matCellDef="let user">{{ user.createdAt | date: 'dd/MM/yyyy' }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Ações</th>
            <td mat-cell *matCellDef="let user">
              <button matIconButton type="button" disabled aria-label="Ações futuras" title="Ações serão habilitadas em fases futuras">
                <mat-icon>more_horiz</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          <tr class="empty-row" *matNoDataRow>
            <td [attr.colspan]="displayedColumns.length">
              <app-empty-state icon="group_off" title="Nenhum usuário cadastrado" />
            </td>
          </tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</section>
