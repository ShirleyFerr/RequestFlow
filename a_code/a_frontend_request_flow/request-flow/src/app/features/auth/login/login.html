<section class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Entrar no RequestFlow</mat-card-title>
      <mat-card-subtitle>Acesse com seu e-mail corporativo</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="login-form" [formGroup]="loginForm" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          <mat-icon matSuffix aria-hidden="true">mail</mat-icon>
          @if (loginForm.controls.email.invalid) {
            <mat-error>{{ emailErrorMessage }}</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            autocomplete="current-password"
          />
          <button
            matIconButton
            matSuffix
            type="button"
            [attr.aria-label]="hidePassword ? 'Mostrar senha' : 'Ocultar senha'"
            (click)="hidePassword = !hidePassword"
          >
            <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
          @if (loginForm.controls.password.hasError('required')) {
            <mat-error>Informe a senha.</mat-error>
          }
        </mat-form-field>

        <button matButton="filled" type="submit" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</section>
