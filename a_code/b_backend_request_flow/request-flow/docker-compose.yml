services:
  mysql:
    image: mysql:8.4
    container_name: requestflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-requestflow}
      MYSQL_USER: ${MYSQL_USER:-requestflow_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - requestflow_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-requestflow_user} -p${MYSQL_PASSWORD:-change_me} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: requestflow-backend:local
    container_name: requestflow-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      QUARKUS_PROFILE: ${QUARKUS_PROFILE:-dev}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-requestflow}
      MYSQL_USER: ${MYSQL_USER:-requestflow_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      JWT_SECRET: ${JWT_SECRET:-change_me_generate_a_secure_secret}
      JWT_ISSUER: ${JWT_ISSUER:-request-flow-api}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:4200}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      IA_API_KEY: ${IA_API_KEY:-}
      IA_API_URL: ${IA_API_URL:-}
      IA_TIMEOUT_MS: ${IA_TIMEOUT_MS:-3000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 5

volumes:
  requestflow_mysql_data:
