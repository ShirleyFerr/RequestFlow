services:
  mysql:
    image: mysql:8
    container_name: requestflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-requestflow}
      MYSQL_USER: ${MYSQL_USER:-requestflow_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - requestflow_network

  backend:
    build:
      context: ./a_code/b_backend_request_flow/request-flow
      dockerfile: Dockerfile
    image: requestflow-backend:local
    container_name: requestflow-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      QUARKUS_PROFILE: ${QUARKUS_PROFILE:-dev}
      BACKEND_PORT: 8080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-requestflow}
      MYSQL_USER: ${MYSQL_USER:-requestflow_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      JWT_SECRET: ${JWT_SECRET:-change_me_generate_a_secure_secret}
      JWT_ISSUER: ${JWT_ISSUER:-request-flow-api}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:4200,http://127.0.0.1,http://127.0.0.1:4200}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gemini-2.5-flash}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-1200}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - requestflow_network

  frontend:
    build:
      context: ./a_code/a_frontend_request_flow/request-flow
      dockerfile: Dockerfile
    image: requestflow-frontend:local
    container_name: requestflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - requestflow_network

networks:
  requestflow_network:
    driver: bridge

volumes:
  mysql_data:
